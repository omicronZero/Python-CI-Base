name: Python Lint, Format, Test

on:
  push:
    branches:
      - "**"

  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
          pip install -e .

      - name: Install pyproject.toml
        run: pip install .

      - name: Ruff lint
        run: ruff check --output-format=github --target-version=py314

      - name: Ruff format
        run: ruff format --diff --target-version=py314

      - name: MyPy
        run: mypy myapp

      - name: Run tests
        run: pytest --cov=myapp --cov-report=xml:cover/report.xml
        
      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
